<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSwarm</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div id="app">
  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="UI.toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">⚡</div>
      <h2>AgentSwarm</h2>
    </div>
    <button class="new-conv-btn" onclick="UI.newConversation()">+ <span data-i18n="newTask">New Task</span></button>
    <div class="conv-search"><input id="convSearch" type="text" oninput="UI.renderConvs()" placeholder="Search conversations..."></div>
    <div class="conv-list" id="convList"><div class="empty-conv">No conversations yet</div></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="main-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="header-btn hamburger-btn" onclick="UI.toggleSidebar()">☰</button>
        <h3 id="convTitle" data-i18n="newTask">New Task</h3>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="themeBtn" onclick="UI.toggleTheme()" title="Toggle theme">☀️</button>
        <button class="header-btn" id="langBtn" onclick="UI.toggleLang()" style="font-size:0.75rem">中</button>
        <button class="header-btn" onclick="UI.openSettings()" title="Settings">⚙</button>
        <button class="header-btn" onclick="UI.toggleMonitor()" title="Live Monitor">◫</button>
        <span class="conn-dot off" id="connDot" title="Disconnected"></span>
        <span class="model-badge">qwen3.5:35b</span>
      </div>
    </header>

    <div class="progress-bar" id="progressBar" style="display:none"><div class="fill" id="progressFill"></div></div>
    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="queryInput" rows="1"></textarea>
        <button id="submitBtn" onclick="UI.submitTask()" data-i18n="send">Send</button>
      </div>
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<!-- Agent panel -->
<div class="agent-panel" id="agentPanel">
  <div class="agent-panel-header">
    <h3 id="panelTitle">Agent Details</h3>
    <button class="agent-panel-close" onclick="UI.closeAgentPanel()">✕</button>
  </div>
  <div class="agent-panel-content" id="panelContent"></div>
</div>

<!-- Command palette -->
<div class="cmd-palette" id="cmdPalette" onclick="UI.closePalette(event)">
  <div class="cmd-palette-box" onclick="event.stopPropagation()">
    <input class="cmd-palette-input" id="paletteInput" type="text" placeholder="Search or type a command..." oninput="UI.filterPalette()" onkeydown="if(event.key==='Escape')UI.closePalette()">
    <div class="cmd-palette-results" id="paletteResults"></div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal" id="settingsModal" onclick="UI.closeSettings(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 data-i18n="settings">Settings</h2>
      <button class="modal-close" onclick="UI.closeSettings()">✕</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-provider="ollama" onclick="UI.switchProvider('ollama')">Ollama</button>
      <button class="tab-btn" data-provider="openai" onclick="UI.switchProvider('openai')">OpenAI</button>
      <button class="tab-btn" data-provider="anthropic" onclick="UI.switchProvider('anthropic')">Anthropic</button>
    </div>
    <div class="form-group" id="fieldBaseUrl"><label class="form-label">Base URL</label><input class="form-input" id="cfgBaseUrl"></div>
    <div class="form-group" id="fieldApiKey" style="display:none"><label class="form-label">API Key</label><input class="form-input" id="cfgApiKey"></div>
    <div class="form-group"><label class="form-label">Classifier Model</label><input class="form-input" id="cfgClassifier"></div>
    <div class="form-group"><label class="form-label">Decomposer Model</label><input class="form-input" id="cfgDecomposer"></div>
    <div class="form-group"><label class="form-label">Default Agent Model</label><input class="form-input" id="cfgDefaultModel"></div>
    <button class="form-submit" onclick="UI.saveSettings()" data-i18n="save">Save</button>
  </div>
</div>

<!-- Live Monitor Panel -->
<div class="live-monitor" id="liveMonitor">
  <div class="monitor-toggle" onclick="UI.toggleMonitor()" id="monitorToggle">
    <span>◀</span>
  </div>
  <div class="monitor-inner">
    <div class="monitor-header">
      <h3>Live Monitor</h3>
      <span class="monitor-summary" id="monitorSummary"></span>
    </div>
    <div class="monitor-progress" id="monitorProgressBar"><div class="monitor-progress-fill" id="monitorProgressFill"></div></div>
    <div class="monitor-agents" id="monitorAgents"></div>
    <div class="monitor-divider">Activity Log</div>
    <div class="monitor-log" id="monitorLog"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
