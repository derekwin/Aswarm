<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSwarm</title>
<link rel="stylesheet" href="/static/tailwind.min.css">
<style>
:root {
  --bg: #0d0d0d; --sidebar-bg: #0a0a0a; --surface: #161616; --border: #262626;
  --text: #ececec; --text-secondary: #999; --text-tertiary: #666;
  --accent: #6c5ce7; --accent-glow: rgba(108,92,231,0.15);
}
.light {
  --bg: #fafafa; --sidebar-bg: #f0f0f0; --surface: #fff; --border: #e5e5e5;
  --text: #1a1a1a; --text-secondary: #666; --text-tertiary: #999;
  --accent: #6c5ce7; --accent-glow: rgba(108,92,231,0.1);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); }
.bg-accent { background: var(--accent) !important; }
.bg-surface { background: var(--surface) !important; }
.border-border { border-color: var(--border) !important; }
.text-accent { color: var(--accent) !important; }
.from-accent { --tw-gradient-from: var(--accent); }
.step-dot { transition: all 0.2s ease; }
.step-running .step-dot { animation: pulse-dot 1.2s infinite; }
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.step-detail { display: none; } .step-detail.show { display: block; }
.typing::after { content: '...'; animation: dots 1.5s steps(3, end) infinite; }
@keyframes dots { 0%,20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%,100% { content: '...'; } }
.fade-up { animation: fadeUp 0.35s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
.sidebar-open .sidebar-overlay { display: block; }
@media (min-width: 768px) { .sidebar-overlay { display: none !important; } }
.progress-bar { transition: width 0.3s ease; }
.conv-item:hover .conv-delete { opacity: 1; }
.conv-delete { opacity: 0; transition: opacity 0.15s; }
.md-bold { font-weight: 600; color: #ececec; }
.md-code { background: #0a0a0a; border: 1px solid #262626; border-radius: 6px; padding: 1px 6px; font-size: 0.8em; font-family: 'SF Mono', 'Fira Code', monospace; }
.md-codeblock { background: #0a0a0a; border: 1px solid #262626; border-radius: 8px; padding: 10px 14px; font-size: 0.78rem; font-family: 'SF Mono', 'Fira Code', monospace; white-space: pre-wrap; overflow-x: auto; margin: 6px 0; }
.cmd-palette { display: none; } .cmd-palette.open { display: flex; }
.toast { animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
.agent-panel { transform: translateX(100%); transition: transform 0.25s ease; }
.agent-panel.open { transform: translateX(0); }
</style>
</head>
<body class="h-screen flex overflow-hidden" style="background:var(--bg);color:var(--text)">

<!-- Settings Modal -->
<div id="settingsModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60" onclick="closeSettings(event)">
  <div class="w-full max-w-md mx-4 bg-[var(--surface)] border border-[var(--border)] rounded-2xl shadow-2xl p-6" onclick="event.stopPropagation()" style="background:var(--surface);border-color:var(--border)">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold" data-i18n="settings">Settings</h2>
      <button onclick="closeSettings()" class="p-1 rounded-lg hover:bg-[var(--border)] transition" style="color:var(--text-secondary)">✕</button>
    </div>
    <div class="space-y-4">
      <div><label class="text-xs text-[var(--text-secondary)] block mb-1" data-i18n="llm_base_url">LLM Base URL</label>
        <input id="cfgBaseUrl" class="w-full px-3 py-2 rounded-lg text-sm" style="background:var(--bg);border:1px solid var(--border);color:var(--text)"></div>
      <div><label class="text-xs text-[var(--text-secondary)] block mb-1" data-i18n="llm_api_key">API Key</label>
        <input id="cfgApiKey" class="w-full px-3 py-2 rounded-lg text-sm" style="background:var(--bg);border:1px solid var(--border);color:var(--text)"></div>
      <div><label class="text-xs text-[var(--text-secondary)] block mb-1" data-i18n="classifier_model">Classifier Model</label>
        <input id="cfgClassifier" class="w-full px-3 py-2 rounded-lg text-sm" style="background:var(--bg);border:1px solid var(--border);color:var(--text)"></div>
      <div><label class="text-xs text-[var(--text-secondary)] block mb-1" data-i18n="decomposer_model">Decomposer Model</label>
        <input id="cfgDecomposer" class="w-full px-3 py-2 rounded-lg text-sm" style="background:var(--bg);border:1px solid var(--border);color:var(--text)"></div>
      <div><label class="text-xs text-[var(--text-secondary)] block mb-1" data-i18n="default_model">Default Agent Model</label>
        <input id="cfgDefaultModel" class="w-full px-3 py-2 rounded-lg text-sm" style="background:var(--bg);border:1px solid var(--border);color:var(--text)"></div>
      <button onclick="saveSettings()" class="w-full py-2.5 rounded-xl text-white text-sm font-semibold transition" style="background:var(--accent)" data-i18n="save">Save</button>
    </div>
  </div>
</div>

<!-- Command Palette -->
<div id="cmdPalette" class="cmd-palette fixed inset-0 z-50 items-start justify-center pt-[15vh]" onclick="closePalette(event)">
  <div class="w-full max-w-lg bg-surface border border-border rounded-2xl shadow-2xl overflow-hidden" onclick="event.stopPropagation()">
    <input id="paletteInput" type="text" placeholder="Search conversations or type a command..."
      class="w-full px-5 py-4 bg-transparent text-sm text-[#ececec] placeholder-[#666] focus:outline-none border-b border-border"
      oninput="filterPalette()" onkeydown="paletteKeydown(event)">
    <div id="paletteResults" class="max-h-80 overflow-y-auto p-2"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

<!-- Sidebar overlay -->
<div class="sidebar-overlay hidden fixed inset-0 bg-black/60 z-20 md:hidden" onclick="toggleSidebar()"></div>

<aside id="sidebar" class="w-72 bg-[#0a0a0a] border-r border-border flex flex-col flex-shrink-0 fixed md:static inset-y-0 left-0 z-30 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
  <div class="p-5 flex items-center gap-3 border-b border-border">
    <div class="w-7 h-7 bg-gradient-to-br from-accent to-[#a78bfa] rounded-lg flex items-center justify-center text-sm flex-shrink-0">⚡</div>
    <h2 class="text-base font-bold tracking-tight truncate">AgentSwarm</h2>
  </div>
  <button onclick="newConversation(); if(window.innerWidth<768)toggleSidebar()" class="mx-3 mt-3 px-4 py-2.5 rounded-xl border border-border bg-surface hover:border-accent hover:bg-[rgba(108,92,231,0.08)] text-sm transition flex items-center gap-2">
    <span class="text-lg leading-none">+</span> New Task
  </button>
  <div class="px-3 pt-2">
    <input id="convSearch" type="text" placeholder="Search conversations..." oninput="renderConvs()"
      class="w-full px-3 py-1.5 bg-[#0a0a0a] border border-border rounded-lg text-xs text-[#999] placeholder-[#555] focus:outline-none focus:border-accent transition">
  </div>
  <div id="convList" class="flex-1 overflow-y-auto p-2">
    <div class="text-center py-6 text-[#666] text-xs">No conversations yet</div>
  </div>
</aside>

<main class="flex-1 flex flex-col min-w-0">
  <header class="px-4 sm:px-5 lg:px-7 py-3 sm:py-4 border-b border-border flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-3">
      <button onclick="toggleSidebar()" class="md:hidden p-1.5 -ml-1 rounded-lg hover:bg-surface transition">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h14M3 10h14M3 15h14"/></svg>
      </button>
      <h3 id="convTitle" class="text-sm font-semibold tracking-tight">New Task</h3>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="toggleTheme()" class="p-1.5 rounded-lg hover:bg-[var(--border)] transition text-sm" title="Toggle theme" id="themeBtn">☀️</button>
      <button onclick="toggleLang()" class="px-2 py-1 rounded-lg hover:bg-[var(--border)] transition text-xs" id="langBtn" style="color:var(--text-secondary)">中</button>
      <button onclick="openSettings()" class="p-1.5 rounded-lg hover:bg-[var(--border)] transition" title="Settings" style="color:var(--text-secondary)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v2M8 12.5v2M2.5 8h2M11.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/></svg>
      </button>
      <span id="connDot" class="w-1.5 h-1.5 rounded-full bg-[#333]" title="Disconnected"></span>
      <span class="text-[10px] sm:text-xs px-2 sm:px-3 py-1 sm:py-1.5 border rounded-full hidden sm:inline" style="background:var(--surface);border-color:var(--border);color:var(--text-secondary)" data-i18n="model_badge">qwen3.5:35b</span>
    </div>
  </header>

  <div id="progressBar" class="h-0.5 bg-border flex-shrink-0 hidden">
    <div id="progressFill" class="h-full bg-accent progress-bar" style="width:0%"></div>
  </div>

  <div id="chatArea" class="flex-1 overflow-y-auto px-4 sm:px-5 lg:px-7 py-6 sm:py-8 flex flex-col gap-5 sm:gap-7"></div>

  <div class="px-3 sm:px-5 lg:px-7 py-3 sm:py-4 border-t border-border flex-shrink-0">
    <div class="flex gap-2 sm:gap-3 max-w-3xl mx-auto items-end">
      <textarea id="queryInput" placeholder="Describe your task..." rows="1"
        class="flex-1 px-3 sm:px-4 py-3 sm:py-3.5 bg-surface border border-border rounded-xl sm:rounded-2xl text-[#ececec] text-sm resize-none min-h-[44px] sm:min-h-[48px] max-h-[120px] sm:max-h-[140px] leading-relaxed focus:outline-none focus:border-accent focus:ring-2 sm:focus:ring-4 focus:ring-[rgba(108,92,231,0.12)] transition"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitTask()}"></textarea>
      <button id="submitBtn" onclick="submitTask()"
        class="px-4 sm:px-6 py-3 sm:py-3.5 bg-accent hover:brightness-110 rounded-xl sm:rounded-2xl text-white font-semibold text-sm transition flex-shrink-0 h-[44px] sm:h-[48px] disabled:opacity-30 disabled:cursor-not-allowed">Send</button>
    </div>
  </div>
</main>

<!-- Agent detail panel -->
<div id="agentPanel" class="agent-panel fixed right-0 top-0 bottom-0 w-80 sm:w-96 bg-[#0a0a0a] border-l border-border z-40 flex flex-col">
  <div class="p-4 border-b border-border flex items-center justify-between">
    <h3 id="panelTitle" class="text-sm font-semibold">Agent Details</h3>
    <button onclick="closeAgentPanel()" class="p-1 rounded-lg hover:bg-surface transition">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4l8 8M12 4l-8 8"/></svg>
    </button>
  </div>
  <div id="panelContent" class="flex-1 overflow-y-auto p-4 text-xs leading-relaxed text-[#999] whitespace-pre-wrap"></div>
</div>

<script>
var conversations = {}, activeConvId = null, eventSource = null, agentStates = {};
var totalAgents = 0, completedAgents = 0;
var lang = localStorage.getItem('lang') || 'en';
var isDark = localStorage.getItem('theme') !== 'light';

// ── i18n ──
var T = {
  en: {
    newTask: 'New Task', send: 'Send', settings: 'Settings',
    llm_base_url: 'LLM Base URL', llm_api_key: 'API Key',
    classifier_model: 'Classifier Model', decomposer_model: 'Decomposer Model',
    default_model: 'Default Agent Model', save: 'Save',
    model_badge: 'qwen3.5:35b', no_convs: 'No conversations yet',
    search_conv: 'Search conversations...', task_placeholder: 'Describe your task...',
    empty_title: 'What do you want to research?',
    empty_desc: 'Describe your task. AgentSwarm decomposes it, spawns specialized agents, and executes them in parallel.',
    classifying: 'Classifying task', decomposing: 'Decomposing',
    executing: 'Executing agents', connected: 'Connected', disconnected: 'Disconnected',
    delete_confirm: 'Delete this conversation?', load_error: 'Connection lost.',
    server_error: 'Server error.', complete: 'Complete',
    agents_finished: ' agents finished.',
  },
  zh: {
    newTask: '新建任务', send: '发送', settings: '设置',
    llm_base_url: 'LLM 接口地址', llm_api_key: 'API 密钥',
    classifier_model: '分类模型', decomposer_model: '分解模型',
    default_model: '默认 Agent 模型', save: '保存',
    model_badge: 'qwen3.5:35b', no_convs: '暂无对话',
    search_conv: '搜索对话...', task_placeholder: '描述你的任务...',
    empty_title: '想要研究什么？',
    empty_desc: '描述你的任务。AgentSwarm 会拆解任务，生成专门 Agent，并行执行。',
    classifying: '正在分类任务', decomposing: '正在拆解任务',
    executing: '正在执行 Agent', connected: '已连接', disconnected: '已断开',
    delete_confirm: '确定删除此对话？', load_error: '连接已断开。',
    server_error: '服务器错误。', complete: '完成',
    agents_finished: ' 个 Agent 完成。',
  }
};
function t(key) { return (T[lang] || T.en)[key] || key; }

// ── Theme ──
function applyTheme() {
  document.documentElement.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
function toggleTheme() { isDark = !isDark; applyTheme(); }

// ── Language ──
function applyLang() {
  document.getElementById('langBtn').textContent = lang === 'zh' ? 'EN' : '中';
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = t(el.dataset.i18n);
  });
  document.getElementById('queryInput').placeholder = t('task_placeholder');
  document.getElementById('convSearch').placeholder = t('search_conv');
  document.getElementById('convTitle').textContent = t('newTask');
  // Re-render UI
  document.getElementById('chatArea').innerHTML = conversations[activeConvId] && conversations[activeConvId].msgs && conversations[activeConvId].msgs.length
    ? (conversations[activeConvId]._html || conversations[activeConvId].msgs.join(''))
    : emptyStateHTML();
  renderConvs();
}
function toggleLang() { lang = lang === 'zh' ? 'en' : 'zh'; localStorage.setItem('lang', lang); applyLang(); }

// ── Settings ──
function openSettings() {
  fetch('/api/settings').then(function(r){return r.json();}).then(function(d){
    document.getElementById('cfgBaseUrl').value = d.llm_base_url || '';
    document.getElementById('cfgApiKey').value = d.llm_api_key || '';
    document.getElementById('cfgClassifier').value = d.classifier_model || '';
    document.getElementById('cfgDecomposer').value = d.decomposer_model || '';
    document.getElementById('cfgDefaultModel').value = d.default_model || '';
    document.getElementById('settingsModal').classList.remove('hidden');
  });
}
function closeSettings(e) { if (e && e.target !== document.getElementById('settingsModal')) return; document.getElementById('settingsModal').classList.add('hidden'); }
function saveSettings() {
  var data = {
    llm_base_url: document.getElementById('cfgBaseUrl').value,
    llm_api_key: document.getElementById('cfgApiKey').value,
    classifier_model: document.getElementById('cfgClassifier').value,
    decomposer_model: document.getElementById('cfgDecomposer').value,
    default_model: document.getElementById('cfgDefaultModel').value,
  };
  fetch('/api/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
    .then(function() { closeSettings(); showToast('✓ ' + t('save') + 'd'); });
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); openPalette(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='n') { e.preventDefault(); newConversation(); }
  if (e.key==='Escape') {
    if (document.getElementById('cmdPalette').classList.contains('open')) closePalette();
    else if (document.getElementById('agentPanel').classList.contains('open')) closeAgentPanel();
    else closeSidebar();
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); submitTask(); }
});

function openPalette() {
  document.getElementById('cmdPalette').classList.add('open');
  document.getElementById('paletteInput').value = '';
  document.getElementById('paletteInput').focus();
  filterPalette();
}
function closePalette(e) { if (e && e.target !== document.getElementById('cmdPalette')) return; document.getElementById('cmdPalette').classList.remove('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full'); document.body.classList.remove('sidebar-open'); }

function filterPalette() {
  var q = document.getElementById('paletteInput').value.toLowerCase();
  var ids = Object.keys(conversations);
  var results = [];
  if (!q) results = ids.slice(-8).reverse();
  else results = ids.filter(function(id) { return conversations[id].title.toLowerCase().includes(q); });
  var html = '<div class="px-3 py-2 text-[10px] text-[#555] uppercase tracking-wider">' + (q ? 'Results' : 'Recent') + '</div>';
  if (!results.length) html += '<div class="px-3 py-4 text-center text-xs text-[#555]">No results</div>';
  for (var i = 0; i < results.length; i++) {
    var c = conversations[results[i]];
    html += '<div class="px-3 py-2 rounded-lg cursor-pointer hover:bg-[rgba(255,255,255,0.03)] text-sm flex items-center justify-between" onclick="switchConversation(\'' + results[i] + '\');closePalette();">' +
      '<span>' + esc(c.title) + '</span><span class="text-[10px] text-[#555]">' + c.time + '</span></div>';
  }
  html += '<div class="border-t border-border mt-2 pt-2 px-3 py-2 rounded-lg cursor-pointer hover:bg-[rgba(108,92,231,0.08)] text-sm text-accent" onclick="newConversation();closePalette();">+ New Task</div>';
  document.getElementById('paletteResults').innerHTML = html;
}

function paletteKeydown(e) {
  if (e.key === 'Escape') closePalette();
  if (e.key === 'Enter') {
    var first = document.querySelector('#paletteResults .cursor-pointer');
    if (first) { first.click(); closePalette(); }
  }
}

function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast px-4 py-3 bg-surface border border-border rounded-xl text-sm shadow-lg max-w-xs';
  t.innerHTML = msg;
  t.style.animation = 'slideDown 0.3s ease';
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(function() { t.remove(); }, 300); }, 4000);
}

function openAgentPanel(tid) {
  var inf = agentStates[tid];
  if (!inf || (!inf.output && !inf.error)) return;
  document.getElementById('panelTitle').textContent = inf.name || tid;
  document.getElementById('panelContent').innerHTML = mdRender((inf.output||'') + (inf.error ? '\n\n[ERROR: ' + inf.error + ']' : '') + (inf.retry ? '\nRetries: ' + inf.retry : ''));
  document.getElementById('agentPanel').classList.add('open');
}
function closeAgentPanel() { document.getElementById('agentPanel').classList.remove('open'); }

function emptyStateHTML(sm) {
  return '<div class="flex flex-col items-center justify-center flex-1 gap-4 sm:gap-5">'+
    '<div class="w-12 h-12 sm:w-14 sm:h-14 bg-[rgba(108,92,231,0.12)] rounded-full flex items-center justify-center text-xl sm:text-2xl">✦</div>'+
    '<h2 class="text-lg sm:text-xl font-semibold tracking-tight text-center">What do you want to research?</h2>'+
    '<p class="text-[#999] text-xs sm:text-sm max-w-xs sm:max-w-md text-center leading-relaxed px-2">Describe your task. AgentSwarm decomposes it, spawns specialized agents, and executes them in parallel.</p>'+
    '<div class="flex gap-2 flex-wrap justify-center px-2">'+
    '<button onclick="suggest(\'调研2025年国产AI芯片市场并生成分析报告\')" class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-full border border-border bg-surface hover:border-accent hover:text-white text-[#999] text-[11px] sm:text-xs transition">国产芯片市场调研</button>'+
    '<button onclick="suggest(\'对比分析 React 和 Vue 在2025年的生态和发展趋势\')" class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-full border border-border bg-surface hover:border-accent hover:text-white text-[#999] text-[11px] sm:text-xs transition">React vs Vue</button>'+
    '<button onclick="suggest(\'写一篇关于大语言模型发展的技术报告\')" class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-full border border-border bg-surface hover:border-accent hover:text-white text-[#999] text-[11px] sm:text-xs transition">LLM报告</button>'+
    '</div></div>';
}

function init() {
  applyTheme(); applyLang();
  loadConversations();
}

function loadConversations() {
  fetch('/api/conversations').then(function(r) { return r.json(); }).then(function(data) {
    data.forEach(function(c) {
      conversations[c.id] = { title: c.title, msgs: [], time: formatTime(c.created_at), _loaded: false };
    });
    renderConvs();
  });
}

function formatTime(iso) {
  try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
  catch(e) { return ''; }
}

function loadConversationMessages(convId) {
  if (conversations[convId]._loaded) return;
  fetch('/api/conversations/' + convId).then(function(r) { return r.json(); }).then(function(data) {
    conversations[convId]._loaded = true;
    if (data.messages && data.messages.length) {
      // Render messages as HTML bubbles
      conversations[convId].msgs = data.messages.map(function(m) {
        if (m.role === 'user') {
          return '<div class="fade-up flex gap-3.5 max-w-3xl self-end flex-row-reverse">' +
            '<div class="px-4 py-3.5 bg-[#2d2a5e] text-[#e8e4ff] rounded-2xl rounded-br-md text-sm leading-relaxed">' + esc(m.content) + '</div>' +
            '<div class="w-8 h-8 rounded-[10px] bg-gradient-to-br from-[#6366f1] to-[#8b5cf6] flex-shrink-0 flex items-center justify-center text-xs font-bold">U</div></div>';
        } else {
          return '<div class="fade-up flex gap-3.5 max-w-3xl self-start">' +
            '<div class="w-8 h-8 rounded-[10px] bg-gradient-to-br from-accent to-[#a78bfa] flex-shrink-0 flex items-center justify-center text-xs font-bold">S</div>' +
            '<div class="flex-1 min-w-0"><div class="px-4 py-3.5 bg-surface border border-border rounded-2xl rounded-bl-md text-sm leading-relaxed whitespace-pre-wrap">' + mdRender(m.content) + '</div></div></div>';
        }
      });
    }
    renderConvs();
  });
}

function setConnected(on) {
  document.getElementById('connDot').className = 'w-1.5 h-1.5 rounded-full ' + (on ? 'bg-green' : 'bg-[#333]');
  document.getElementById('connDot').title = on ? 'Connected' : 'Disconnected';
}

function updateProgress() {
  var bar = document.getElementById('progressBar'), fill = document.getElementById('progressFill');
  if (totalAgents === 0) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  fill.style.width = Math.round(completedAgents / totalAgents * 100) + '%';
}

function toggleSidebar() {
  var s = document.getElementById('sidebar');
  s.classList.toggle('-translate-x-full');
  document.body.classList.toggle('sidebar-open');
}

function newConversation() {
  if (eventSource) eventSource.close();
  fetch('/api/conversations', { method: 'POST' }).then(function(r) { return r.json(); }).then(function(c) {
    conversations[c.id] = { title: c.title, msgs: [], time: formatTime(c.created_at), _loaded: true };
    activeConvId = c.id;
    renderConvs();
    document.getElementById('chatArea').innerHTML = emptyStateHTML();
    document.getElementById('convTitle').textContent = 'New Task';
    document.getElementById('submitBtn').disabled = false;
    agentStates = {}; totalAgents = 0; completedAgents = 0; updateProgress();
  });
}

function deleteConversation(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this conversation?')) return;
  fetch('/api/conversations/' + id, { method: 'DELETE' }).then(function() {
    delete conversations[id];
    if (activeConvId === id) {
      var ids = Object.keys(conversations);
      if (ids.length) { switchConversation(ids[ids.length - 1]); }
      else { activeConvId = null; document.getElementById('chatArea').innerHTML = emptyStateHTML(); document.getElementById('convTitle').textContent = 'New Task'; }
    }
    renderConvs();
  });
}

function switchConversation(id) {
  if (eventSource) eventSource.close();
  if (conversations[activeConvId]) conversations[activeConvId]._html = document.getElementById('chatArea').innerHTML;
  activeConvId = id; agentStates = {}; totalAgents = 0; completedAgents = 0; updateProgress();
  var c = conversations[id];
  document.getElementById('convTitle').textContent = c.title;
  if (!c._loaded) {
    document.getElementById('chatArea').innerHTML = '<div class="flex items-center justify-center flex-1"><span class="typing text-[#666]">Loading conversation</span></div>';
    loadConversationMessages(id);
    // Re-render after messages load
    setTimeout(function() {
      if (activeConvId === id) {
        document.getElementById('chatArea').innerHTML = c._html || (c.msgs && c.msgs.length ? c.msgs.join('') : emptyStateHTML());
      }
    }, 300);
    document.getElementById('submitBtn').disabled = false;
    renderConvs();
    return;
  }
  document.getElementById('chatArea').innerHTML = c._html || (c.msgs && c.msgs.length ? c.msgs.join('') : emptyStateHTML());
  renderConvs();
  document.getElementById('submitBtn').disabled = false;
}

function renderConvs() {
  var l = document.getElementById('convList'), ids = Object.keys(conversations);
  var filter = (document.getElementById('convSearch').value || '').toLowerCase();
  if (filter) ids = ids.filter(function(id) { return conversations[id].title.toLowerCase().includes(filter); });
  if (!ids.length) { l.innerHTML = '<div class="text-center py-6 text-[#666] text-xs">' + (filter ? 'No matches' : 'No conversations yet') + '</div>'; return; }
  l.innerHTML = ids.map(function(id) {
    var c = conversations[id], active = id === activeConvId;
    return '<div class="conv-item px-3 py-2.5 rounded-lg cursor-pointer text-xs transition mb-0.5 flex items-center justify-between group' + (active ? ' bg-surface' : ' hover:bg-surface') + '" onclick="switchConversation(\'' + id + '\')">' +
      '<div class="truncate flex-1"><span class="' + (active ? 'text-white font-medium' : 'text-[#999]') + '">' + esc(c.title) + '</span><div class="text-[10px] text-[#555]">' + c.time + '</div></div>' +
      '<span class="conv-delete ml-2 px-1.5 py-0.5 rounded hover:bg-red/20 text-[#555] hover:text-red text-[10px] flex-shrink-0" onclick="deleteConversation(\'' + id + '\', event)">✕</span>' +
      '</div>';
  }).join('');
}

function suggest(t) { document.getElementById('queryInput').value = t; document.getElementById('queryInput').focus(); }

function loadMermaid(cb) {
  if (window.mermaid) return cb();
  var s = document.createElement('script');
  s.src = '/static/mermaid.min.js';
  s.onload = function() { mermaid.initialize({ startOnLoad: true, theme: 'dark' }); cb(); };
  document.head.appendChild(s);
}

function submitTask() {
  var q = document.getElementById('queryInput').value.trim();
  if (!q) return;
  if (!activeConvId) newConversation();
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('queryInput').value = '';
  var chat = document.getElementById('chatArea');
  var ee = chat.querySelector('.flex-col.items-center.justify-center');
  if (ee) chat.innerHTML = '';

  if (conversations[activeConvId].title === 'New Task') {
    conversations[activeConvId].title = q.slice(0, 40);
    document.getElementById('convTitle').textContent = q.slice(0, 40);
    renderConvs();
  }

  var u = '<div class="fade-up flex gap-3.5 max-w-3xl self-end flex-row-reverse"><div class="px-4 py-3.5 bg-[#2d2a5e] text-[#e8e4ff] rounded-2xl rounded-br-md text-sm leading-relaxed">' + esc(q) + '</div><div class="w-8 h-8 rounded-[10px] bg-gradient-to-br from-[#6366f1] to-[#8b5cf6] flex-shrink-0 flex items-center justify-center text-xs font-bold">U</div></div>';
  chat.insertAdjacentHTML('beforeend', u);
  conversations[activeConvId].msgs.push(u);

  var aid = 'asst-' + Date.now();
  var a = '<div class="fade-up flex gap-3.5 max-w-3xl self-start" id="' + aid + '"><div class="w-8 h-8 rounded-[10px] bg-gradient-to-br from-accent to-[#a78bfa] flex-shrink-0 flex items-center justify-center text-xs font-bold">S</div><div class="flex-1 min-w-0"><div class="px-4 py-3.5 bg-surface border border-border rounded-2xl rounded-bl-md text-sm leading-relaxed"><span class="typing text-[#666]">Classifying task</span></div><div id="st-' + aid + '"></div></div></div>';
  chat.insertAdjacentHTML('beforeend', a);
  conversations[activeConvId].msgs.push(a);
  chat.scrollTop = chat.scrollHeight;

  var b = document.querySelector('#' + aid + ' .bg-surface');
  var st = document.getElementById('st-' + aid);

  setConnected(false);
  fetch('/run?query=' + encodeURIComponent(q) + '&conv_id=' + encodeURIComponent(activeConvId), { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('/stream/' + d.task_id);
      setConnected(true);
      eventSource.onmessage = function(e) { handleEvent(JSON.parse(e.data), b, st, chat); };
      eventSource.onerror = function() { setConnected(false); b.innerHTML = 'Connection lost.'; document.getElementById('submitBtn').disabled = false; };
    })
    .catch(function() { setConnected(false); b.innerHTML = 'Server error.'; document.getElementById('submitBtn').disabled = false; });
}

function handleEvent(d, b, st, chat) {
  console.log('[AgentSwarm]', d.type, d.subtask_id || '', d.msg || '');
  switch (d.type) {
    case 'status':
      b.innerHTML = '<span class="typing text-[#666]">' + esc(d.msg) + '</span>';
      break;
    case 'dag':
      totalAgents = d.subtasks.length;
      completedAgents = 0;
      updateProgress();
      b.innerHTML = 'Decomposed into <strong>' + d.subtasks.length + ' agents</strong> across <strong>' + d.parallel_groups.length + ' parallel groups</strong>.';
      loadMermaid(function() { renderStepper(st, d); });
      break;
    case 'agent_start':
      agentStates[d.subtask_id] = { state: 'running', name: d.agent_name, role: d.role };
      updateStep(d.subtask_id);
      break;
    case 'agent_done':
      agentStates[d.subtask_id] = { state: d.state, name: agentStates[d.subtask_id] ? agentStates[d.subtask_id].name : d.subtask_id, role: agentStates[d.subtask_id] ? agentStates[d.subtask_id].role : '', output: d.output, error: d.error, retry: d.retry_count };
      updateStep(d.subtask_id);
      if (d.state === 'completed' || d.state === 'failed') { completedAgents++; updateProgress(); }
      break;
    case 'done':
      completedAgents = totalAgents;
      updateProgress();
      setConnected(false);
      var doneMsg = '<strong>Task complete</strong><br>' + (d.results ? d.results.filter(function(r) { return r.state === 'completed'; }).length : 0) + '/' + (d.results ? d.results.length : 0) + ' agents finished';
      b.innerHTML = doneMsg;
      if (d.summary) {
        var s = document.createElement('div');
        s.className = 'mt-3 p-3.5 bg-[#0a0a0a] rounded-lg text-xs leading-relaxed whitespace-pre-wrap max-h-[500px] overflow-y-auto';
        s.innerHTML = mdRender(d.summary);
        b.appendChild(s);
      }
      document.getElementById('submitBtn').disabled = false;
      if (eventSource) eventSource.close();
      var taskTitle = conversations[activeConvId] ? conversations[activeConvId].title : 'Task';
      showToast('<div class="font-medium text-xs text-green">✓ Complete</div><div class="text-[10px] text-[#999] mt-0.5">' + esc(taskTitle) + '</div>');
      agentStates = {};
      break;
    case 'error':
      setConnected(false);
      b.innerHTML = '<span class="text-red">' + esc(d.msg) + '</span>';
      document.getElementById('submitBtn').disabled = false;
      break;
  }
  chat.scrollTop = chat.scrollHeight;
}

function renderStepper(st, d) {
  st.innerHTML = '';
  var bl = document.createElement('div');
  bl.className = 'mt-4';

  var dag = document.createElement('div');
  dag.className = 'bg-[#0a0a0a] border border-border rounded-xl p-3.5 mb-3';
  var mm = 'graph LR\n';
  var colors = ['#6c5ce7','#00d26a','#f5a623','#f93a3a','#4f8fff','#a78bfa'];
  for (var gi = 0; gi < d.parallel_groups.length; gi++) {
    mm += '  subgraph G' + (gi + 1) + '[G' + (gi + 1) + ']\n    style G' + (gi + 1) + ' fill:#0a0a0a,stroke:' + colors[gi % colors.length] + '\n';
    for (var ti = 0; ti < d.parallel_groups[gi].length; ti++) {
      var tid = d.parallel_groups[gi][ti], sd = d.subtasks.find(function(x) { return x.id === tid; }) || {};
      mm += '    ' + tid + '["' + esc((sd.name || tid).slice(0, 18)) + '"]\n';
    }
    mm += '  end\n';
  }
  for (var si = 0; si < d.subtasks.length; si++) {
    var s = d.subtasks[si];
    for (var di = 0; di < s.depends_on.length; di++) { mm += '  ' + s.depends_on[di] + ' --> ' + s.id + '\n'; }
  }
  dag.innerHTML = '<div class="mermaid">' + mm + '</div>';
  bl.appendChild(dag);

  var hd = document.createElement('div');
  hd.className = 'flex items-center gap-2 mb-2.5';
  hd.innerHTML = '<span class="text-xs font-semibold text-[#999]">Agents</span><span class="text-[10px] px-2 py-0.5 rounded-md bg-[rgba(108,92,231,0.15)] text-accent font-medium">' + d.parallel_groups.length + ' groups</span>';
  bl.appendChild(hd);

  var ss = document.createElement('div');
  ss.className = 'flex flex-col gap-0.5';
  for (var si2 = 0; si2 < d.subtasks.length; si2++) {
    var s2 = d.subtasks[si2], gIdx = d.parallel_groups.findIndex(function(g) { return g.includes(s2.id); });
    var sp = document.createElement('div');
    sp.className = 'step flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-[rgba(255,255,255,0.02)] cursor-default pending';
    sp.id = 'step-' + s2.id;
    sp.innerHTML = '<div class="step-dot w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-[10px] border-2 border-border text-[#666]">' + (parseInt(s2.id.replace('t', '')) || '') + '</div><div class="flex-1 min-w-0"><div class="text-xs font-medium">' + s2.name.replace(/_/g, ' ') + '</div><div class="text-[10px] text-[#666] mt-0.5">G' + (gIdx + 1) + ' · ' + s2.tools.join(', ') + '</div></div>';
    sp.addEventListener('click', function(tid) { return function() { openAgentPanel(tid); }; }(s2.id));
    ss.appendChild(sp);
  }
  bl.appendChild(ss);
  st.appendChild(bl);
}

function updateStep(tid) {
  var sp = document.getElementById('step-' + tid);
  if (!sp) return;
  var inf = agentStates[tid];
  sp.className = sp.className.replace(/pending|running|completed|failed/g, inf.state);
  if (inf.state === 'running') sp.className += ' step-running';
  if (inf.state === 'completed' || inf.state === 'failed') sp.className += ' cursor-pointer';
  var dot = sp.querySelector('.step-dot');
  dot.textContent = inf.state === 'completed' ? '✓' : inf.state === 'failed' ? '✗' : dot.textContent;
  dot.className = 'step-dot w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-[10px]';
  if (inf.state === 'completed') dot.className += ' bg-green border-green text-white';
  else if (inf.state === 'failed') dot.className += ' bg-red border-red text-white';
  else if (inf.state === 'running') dot.className += ' border-accent text-accent bg-[rgba(108,92,231,0.15)]';
  else dot.className += ' border-border text-[#666]';
}

function toggleStepDetail(tid) {
  var inf = agentStates[tid];
  if (!inf || (!inf.output && !inf.error)) return;
  var el = document.getElementById('dt-' + tid);
  if (!el) {
    el = document.createElement('div');
    el.className = 'step-detail px-3 py-2 pb-3 text-xs text-[#999] whitespace-pre-wrap border-b border-border mb-1';
    el.id = 'dt-' + tid;
    document.getElementById('step-' + tid).parentNode.insertBefore(el, document.getElementById('step-' + tid).nextSibling);
  }
  el.innerHTML = mdRender((inf.output || '') + (inf.error ? '\n[ERROR: ' + inf.error + ']' : '') + (inf.retry ? '\nRetries: ' + inf.retry : ''));
  el.classList.toggle('show');
}

function mdRender(text) {
  return esc(text)
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<div class="md-codeblock">$2</div>')
    .replace(/\*\*(.+?)\*\*/g, '<span class="md-bold">$1</span>')
    .replace(/`([^`]+)`/g, '<code class="md-code">$1</code>');
}

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

init();
</script>
