<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentSwarm</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
:root {
  --bg: #0f0f0f;
  --sidebar-bg: #0a0a0a;
  --card-bg: #1a1a1a;
  --card-border: #2a2a2a;
  --text: #e5e5e5;
  --text-dim: #888;
  --accent: #4f8fff;
  --accent-dim: #3a6fd8;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --radius: 12px;
  --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

.sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--card-border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--card-border); display: flex; align-items: center; gap: 10px; }
.sidebar-header .logo { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), #a78bfa); border-radius: 6px; }
.sidebar-header h2 { font-size: 1rem; font-weight: 700; }
.project-list { flex: 1; overflow-y: auto; padding: 8px; }
.project-item { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.85rem; color: var(--text-dim); transition: all 0.15s; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
.project-item:hover { background: var(--card-bg); color: var(--text); }
.project-item.active { background: var(--card-bg); color: var(--text); font-weight: 500; }
.project-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
.project-item.active .dot { background: var(--accent); }
.new-project-btn { margin: 8px; padding: 10px; border-radius: var(--radius-sm); border: 1px dashed var(--card-border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
.new-project-btn:hover { border-color: var(--accent); color: var(--accent); }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.main-header { padding: 14px 24px; border-bottom: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.main-header h3 { font-size: 0.95rem; font-weight: 600; }
.model-badge { font-size: 0.75rem; padding: 4px 10px; background: var(--card-bg); border-radius: 20px; color: var(--text-dim); border: 1px solid var(--card-border); }
.chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

.message { display: flex; gap: 12px; max-width: 800px; animation: slideIn 0.3s ease; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }
.avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; }
.avatar.user { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
.avatar.assistant { background: linear-gradient(135deg, var(--accent), #a78bfa); }
.bubble { padding: 14px 18px; border-radius: var(--radius); font-size: 0.9rem; line-height: 1.6; }
.bubble.user { background: var(--accent-dim); color: #fff; border-bottom-right-radius: 4px; }
.bubble.assistant { background: var(--card-bg); border: 1px solid var(--card-border); border-bottom-left-radius: 4px; }

.agent-block { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; margin-top: 12px; }
.agent-block-header { padding: 10px 14px; background: rgba(79,143,255,0.05); border-bottom: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
.agent-block-header:hover { background: rgba(79,143,255,0.1); }
.dag-mini { padding: 12px 14px; border-bottom: 1px solid var(--card-border); background: #0d0d0d; }
.agent-grid { display: grid; grid-template-columns: 1fr; gap: 1px; background: var(--card-border); }
.agent-row { display: grid; grid-template-columns: 1fr 80px 140px; gap: 1px; background: var(--card-border); font-size: 0.78rem; }
.agent-row > div { background: var(--bg); padding: 8px 12px; display: flex; align-items: center; }
.agent-row .name { font-weight: 500; }
.agent-row .state { justify-content: center; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.agent-row .state.running { color: var(--accent); }
.agent-row .state.completed { color: var(--green); }
.agent-row .state.failed { color: var(--red); }
.agent-row .state.pending { color: var(--text-dim); }
.agent-row .tools { color: var(--text-dim); font-size: 0.7rem; }
.agent-output-inline { padding: 10px 14px; font-size: 0.75rem; color: var(--text-dim); max-height: 180px; overflow-y: auto; white-space: pre-wrap; border-top: 1px solid var(--card-border); display: none; }
.agent-output-inline.show { display: block; }

.input-area { padding: 16px 24px; border-top: 1px solid var(--card-border); flex-shrink: 0; }
.input-wrapper { display: flex; gap: 8px; max-width: 800px; margin: 0 auto; }
.input-wrapper textarea { flex: 1; padding: 12px 16px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 0.9rem; resize: none; min-height: 44px; max-height: 120px; line-height: 1.5; }
.input-wrapper textarea:focus { outline: none; border-color: var(--accent); }
.input-wrapper button { padding: 0 20px; background: var(--accent); border: none; border-radius: var(--radius); color: white; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: background 0.15s; flex-shrink: 0; }
.input-wrapper button:hover { background: var(--accent-dim); }
.input-wrapper button:disabled { opacity: 0.4; cursor: not-allowed; }

@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.pulse { animation: pulse 1.5s infinite; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .agent-row { grid-template-columns: 1fr 60px; }
  .agent-row .tools { display: none; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo"></div>
    <h2>AgentSwarm</h2>
  </div>
  <div class="project-list" id="projectList">
    <div class="project-item active" data-id="default">
      <div class="dot"></div> Research Demo
    </div>
  </div>
  <button class="new-project-btn" onclick="newProject()">+ New Project</button>
</aside>

<main class="main">
  <header class="main-header">
    <h3 id="projectTitle">Research Demo</h3>
    <span class="model-badge">qwen3.5:35b</span>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="message assistant" style="align-self:center; opacity:0.5; font-size:0.85rem; color:var(--text-dim); margin-top:60px;">
      Enter a task to start the agent swarm
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="queryInput" placeholder="Describe your task..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitTask()}"></textarea>
      <button id="submitBtn" onclick="submitTask()">Send</button>
    </div>
  </div>
</main>

<script>
mermaid.initialize({ startOnLoad: true, theme: 'dark' });

let eventSource = null;
let agentStates = {};

function submitTask() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('queryInput').value = '';

  const chat = document.getElementById('chatArea');

  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.innerHTML = `<div class="bubble user">${escapeHtml(query)}</div><div class="avatar user">U</div>`;
  chat.appendChild(userMsg);

  const asstMsg = document.createElement('div');
  asstMsg.className = 'message assistant';
  asstMsg.id = `msg-${Date.now()}`;
  asstMsg.innerHTML = `
    <div class="avatar assistant">S</div>
    <div style="flex:1">
      <div class="bubble assistant pulse" id="statusBubble">Planning task decomposition...</div>
      <div id="agentContainer"></div>
    </div>`;
  chat.appendChild(asstMsg);
  chat.scrollTop = chat.scrollHeight;

  const statusBubble = asstMsg.querySelector('#statusBubble');
  const agentContainer = asstMsg.querySelector('#agentContainer');

  fetch(`/run?query=${encodeURIComponent(query)}`, { method: 'POST' })
    .then(r => r.json())
    .then(({ task_id }) => {
      if (eventSource) eventSource.close();
      eventSource = new EventSource(`/stream/${task_id}`);
      eventSource.onmessage = (e) => handleEvent(JSON.parse(e.data), statusBubble, agentContainer);
      eventSource.onerror = () => {
        statusBubble.className = 'bubble assistant';
        statusBubble.textContent = 'Connection lost.';
        document.getElementById('submitBtn').disabled = false;
      };
    });
}

function handleEvent(data, statusBubble, container) {
  const chat = document.getElementById('chatArea');
  switch (data.type) {
    case 'status':
      statusBubble.className = 'bubble assistant pulse';
      statusBubble.textContent = data.msg;
      break;

    case 'dag':
      statusBubble.className = 'bubble assistant';
      statusBubble.innerHTML = `Decomposed into <strong>${data.subtasks.length} agents</strong> across <strong>${data.parallel_groups.length} groups</strong>. Intent: ${data.intent}.`;
      renderAgentBlock(container, data);
      break;

    case 'agent_start':
      agentStates[data.subtask_id] = { state: 'running' };
      refreshRows();
      break;

    case 'agent_done':
      agentStates[data.subtask_id] = {
        state: data.state, output: data.output, error: data.error, retry: data.retry_count,
      };
      refreshRows();
      break;

    case 'done':
      statusBubble.className = 'bubble assistant';
      statusBubble.innerHTML = `<strong>Task complete.</strong><br><br>${escapeHtml(data.summary).replace(/\n/g, '<br>')}`;
      document.getElementById('submitBtn').disabled = false;
      if (eventSource) eventSource.close();
      break;

    case 'error':
      statusBubble.className = 'bubble assistant';
      statusBubble.innerHTML = `<span style="color:#ef4444">${escapeHtml(data.msg)}</span>`;
      document.getElementById('submitBtn').disabled = false;
      break;
  }
  chat.scrollTop = chat.scrollHeight;
}

function renderAgentBlock(container, data) {
  container.innerHTML = '';
  const block = document.createElement('div');
  block.className = 'agent-block';

  const header = document.createElement('div');
  header.className = 'agent-block-header';
  header.innerHTML = `<span>${data.subtasks.length} Agents · ${data.parallel_groups.length} Groups</span>`;
  block.appendChild(header);

  const dagDiv = document.createElement('div');
  dagDiv.className = 'dag-mini';
  let mm = 'graph LR\n';
  for (let gi = 0; gi < data.parallel_groups.length; gi++) {
    mm += `  subgraph G${gi+1}[Group ${gi+1}]\n`;
    mm += `    style G${gi+1} fill:#0d0d0d,stroke:#2a2a2a\n`;
    for (const tid of data.parallel_groups[gi]) {
      const s = data.subtasks.find(x => x.id === tid) || {};
      mm += `    ${tid}["${(s.name||tid).slice(0,25)}"]\n`;
    }
    mm += `  end\n`;
  }
  for (const s of data.subtasks) {
    for (const dep of s.depends_on) mm += `  ${dep} --> ${s.id}\n`;
  }
  dagDiv.innerHTML = `<div class="mermaid">${mm}</div>`;
  block.appendChild(dagDiv);

  const grid = document.createElement('div');
  grid.className = 'agent-grid';
  grid.id = 'agentGrid';
  grid.innerHTML = '<div class="agent-row" style="color:var(--text-dim);font-size:0.7rem;text-transform:uppercase"><div>Agent</div><div>State</div><div>Tools</div></div>';
  for (const s of data.subtasks) {
    const gIdx = data.parallel_groups.findIndex(g => g.includes(s.id));
    const row = document.createElement('div');
    row.className = 'agent-row';
    row.id = `row-${s.id}`;
    row.innerHTML = `
      <div class="name">${s.name.replace(/_/g,' ')} <span style="color:var(--text-dim);font-size:0.65rem">G${gIdx+1}</span></div>
      <div class="state pending" id="state-${s.id}">pending</div>
      <div class="tools">${s.tools.join(', ')}</div>`;
    row.addEventListener('click', () => toggleOutput(s.id));
    grid.appendChild(row);
  }
  block.appendChild(grid);
  container.appendChild(block);
}

function refreshRows() {
  for (const [tid, info] of Object.entries(agentStates)) {
    const el = document.getElementById(`state-${tid}`);
    if (!el) continue;
    el.textContent = info.state;
    el.className = `state ${info.state}`;
    if (info.state === 'completed' || info.state === 'failed') {
      document.getElementById(`row-${tid}`).style.cursor = 'pointer';
    }
  }
}

const outputDivs = {};
function toggleOutput(tid) {
  const info = agentStates[tid];
  if (!info || (!info.output && !info.error)) return;
  let el = outputDivs[tid];
  if (!el) {
    el = document.createElement('div');
    el.className = 'agent-output-inline show';
    el.id = `out-${tid}`;
    document.getElementById(`row-${tid}`).after(el);
    outputDivs[tid] = el;
  }
  el.textContent = (info.output||'') + (info.error ? `\n[${info.error}]` : '') + (info.retry ? `\nRetries: ${info.retry}` : '');
  el.classList.toggle('show');
}

function newProject() {
  const name = prompt('Project name:') || 'New Project';
  const el = document.createElement('div');
  el.className = 'project-item';
  el.innerHTML = '<div class="dot"></div>' + name;
  el.onclick = () => {
    document.querySelectorAll('.project-item').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('projectTitle').textContent = name;
  };
  document.getElementById('projectList').appendChild(el);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
