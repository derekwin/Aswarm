version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: agentswarm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: .
    container_name: agentswarm-backend
    ports:
      - "8000:8000"
    environment:
      - AGENTSWARM_LLM_BASE_URL=http://ollama:11434/v1
      - AGENTSWARM_LLM_API_KEY=ollama
      - AGENTSWARM_DECOMPOSER_MODEL=${AGENTSWARM_DECOMPOSER_MODEL:-qwen3.5:35b}
      - AGENTSWARM_DEFAULT_MODEL=${AGENTSWARM_DEFAULT_MODEL:-qwen3.5:35b}
    volumes:
      - agentswarm_data:/app/data
      - agentswarm_checkpoints:/app/checkpoints
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  agentswarm_data:
  agentswarm_checkpoints:
